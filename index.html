<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paranormal Island</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bg-gif {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.8;
        }

        h1 {
            color: red;
            font-family: 'Georgia', serif;
            font-size: 3em;
            text-align: center;
            animation: flicker 2s infinite;
            z-index: 1;
            text-shadow: 0 0 20px red;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <img id="bg-gif" src="background.gif" alt="background">

    <h1>Welcome to Dinosaur Island...</h1>
<audio id="bg-music" loop>
    <source src="horrorisland.mp3" type="audio/mpeg">
</audio>

<script>
    const music = document.getElementById('bg-music');
    
    // Try autoplay immediately
    music.play().catch(() => {
        // If browser blocks it, play on first interaction
        document.addEventListener('click', () => {
            music.play();
        }, { once: true });
    });
</script>
</body>
</html>
