<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paranormal Island</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #bg-gif {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0;
            transition: opacity 3s ease;
        }

        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        h1 {
            color: red;
            font-family: 'Georgia', serif;
            font-size: 3em;
            text-align: center;
            animation: flicker 2s infinite;
            text-shadow: 0 0 20px red;
            margin-bottom: 40px;
        }

        #startbtn {
            background-color: transparent;
            color: red;
            border: 2px solid red;
            padding: 15px 40px;
            font-family: 'Georgia', serif;
            font-size: 1.2em;
            cursor: pointer;
            animation: flicker 3s infinite;
            transition: all 0.3s ease;
        }

        #startbtn:hover {
            background-color: red;
            color: black;
        }

        #loader {
            display: none;
            color: red;
            font-family: 'Georgia', serif;
            font-size: 1.2em;
            animation: flicker 1s infinite;
        }

        #hand-link {
            display: none;
            z-index: 2;
        }

        #hand {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            z-index: 2;
            cursor: pointer;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <img id="bg-gif" src="background.gif" alt="background">

    <div id="start-screen">
        <h1>Welcome to Dinosaur Island...</h1>
        <button id="startbtn">Enter if you dare...</button>
        <p id="loader"></p>
    </div>

    <a id="hand-link" href="island.html">
        <img id="hand" src="Yourownrisk.png" alt="severed hand">
    </a>

    <audio id="bg-music" preload="auto" loop>
        <source src="horrorisland.mp3" type="audio/mpeg">
    </audio>

    <script>
        const startbtn = document.getElementById('startbtn');
        const loader = document.getElementById('loader');
        const music = document.getElementById('bg-music');
        const bg = document.getElementById('bg-gif');
        const startScreen = document.getElementById('start-screen');
        const handLink = document.getElementById('hand-link');

        startbtn.addEventListener('click', () => {
            // Show loader, hide button
            startbtn.style.display = 'none';
            loader.style.display = 'block';

            // Play music
            music.play().then(() => {
                // Fade in background
                bg.style.opacity = '0.8';

                // Hide start screen after fade
                setTimeout(() => {
                    startScreen.style.display = 'none';
                    handLink.style.display = 'block';
                }, 3000);

                // Hide loader
                loader.style.display = 'none';
            });
        });
    </script>

</body>
</html>
